<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oranssi Äänipäiväkirja PRO v12</title>
    <style>
        :root {
            --bg-color: #121212; --surface-color: #1e1e1e;
            --primary-orange: #ff6600; --light-orange: #ff944d;
            --text-color: #ffffff; --text-muted: #b3b3b3; --danger-red: #cc0000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background-color 0.1s; }
        body.flash { background-color: #ff6600; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 25px; }
        header { text-align: center; }
        header h1 { color: var(--primary-orange); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px; }
        .record-zone { background-color: var(--surface-color); border-radius: 20px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #2a2a2a; transition: all 0.3s ease; }
        .record-zone.recording { border-color: var(--primary-orange); animation: pulse-border 2s infinite; }
        .record-btn { width: 200px; height: 200px; border-radius: 40px; border: none; background-color: var(--primary-orange); color: white; font-size: 1.4rem; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .record-btn.recording { background-color: var(--danger-red); animation: pulse-btn 1.5s infinite; }
        .mic-icon { font-size: 3rem; }
        .status-text { font-size: 1.2rem; font-weight: 500; color: var(--light-orange); text-align: center; }
        .live-preview { width: 100%; min-height: 60px; background-color: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; font-size: 1.1rem; border-left: 4px solid var(--primary-orange); display: none; }
        .history-zone { display: flex; flex-direction: column; gap: 15px; }
        .history-zone h2 { font-size: 1.3rem; color: var(--light-orange); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .entry-card { background-color: var(--surface-color); border-radius: 15px; padding: 20px; border-left: 5px solid var(--primary-orange); display: flex; flex-direction: column; gap: 15px; }
        .entry-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .entry-date { font-weight: bold; color: var(--light-orange); font-size: 1.1rem; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-small { background-color: transparent; border: 1px solid var(--primary-orange); color: var(--primary-orange); padding: 6px 14px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-small.delete { border-color: var(--danger-red); color: var(--danger-red); }
        .btn-small.save { background-color: var(--primary-orange); color: white; }
        .entry-content { font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; }
        .entry-editor { width: 100%; min-height: 120px; background-color: rgba(0,0,0,0.3); border: 1px solid var(--primary-orange); border-radius: 10px; padding: 12px; font-size: 1.1rem; line-height: 1.6; color: var(--text-color); resize: vertical; display: none; }
        .no-entries { text-align: center; color: var(--text-muted); padding: 20px; font-style: italic; }
        @keyframes pulse-btn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes pulse-border { 0%,100% { box-shadow: 0 0 15px rgba(255,102,0,0.2); } 50% { box-shadow: 0 0 30px rgba(255,102,0,0.5); background-color: #1a0f07; } }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Oranssi Äänipäiväkirja PRO v12</h1></header>
    <div class="record-zone" id="recordZone">
        <button class="record-btn" id="recordBtn">
            <span class="mic-icon" id="micIcon">🎙️</span>
            <span id="btnText">Käynnistetään...</span>
        </button>
        <div class="status-text" id="statusText">Valmistellaan...</div>
        <div class="live-preview" id="livePreview"></div>
    </div>
    <div class="history-zone">
        <h2>Tallennetut päivät</h2>
        <div id="entriesContainer"></div>
    </div>
</div>

<script>
    const täytesanat = ["ööö", "öö", "ää", "niinku", "tuota", "totta", "silleen", "sit", "sitku"];

    function siivoaTeksti(t) {
        if (!t) return "";
        täytesanat.forEach(s => {
            t = t.replace(new RegExp(`(^|\\s)${s}(\\s|$)`, 'gi'), ' ');
        });
        t = t.replace(/\s+/g, ' ').trim();
        return t.length > 0 ? t.charAt(0).toUpperCase() + t.slice(1) : "";
    }

    function vainUusiOsa(uusi, tallennettu) {
        if (!tallennettu || !uusi) return uusi;
        const u = uusi.trim().toLowerCase();
        const t = tallennettu.trim().toLowerCase();
        if (t.includes(u)) return "";
        const tSanat = t.split(/\s+/);
        const uSanat = uusi.trim().split(/\s+/);
        for (let pituus = Math.min(tSanat.length, uSanat.length - 1); pituus >= 1; pituus--) {
            const tLoppu = tSanat.slice(-pituus).join(' ');
            const uAlku = uSanat.slice(0, pituus).join(' ').toLowerCase();
            if (tLoppu === uAlku) {
                return uSanat.slice(pituus).join(' ');
            }
        }
        return uusi;
    }

    function väläytäRuutu() {
        document.body.classList.add('flash');
        setTimeout(() => document.body.classList.remove('flash'), 200);
    }

    async function pyydäWakeLock() {
        if ('wakeLock' in navigator) {
            try { await navigator.wakeLock.request('screen'); } catch(e) {}
        }
    }

    const recordBtn = document.getElementById('recordBtn');
    const recordZone = document.getElementById('recordZone');
    const statusText = document.getElementById('statusText');
    const livePreview = document.getElementById('livePreview');
    const micIcon = document.getElementById('micIcon');
    const btnText = document.getElementById('btnText');

    let recognition = null;
    let isRecording = false;
    let lockRestart = false;
    let restartTimer = null;

    function haePvm() {
        const d = new Date();
        return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
    }

    function haeTallennettu() {
        const kaikki = JSON.parse(localStorage.getItem('aanipaivakirja')) || {};
        return (kaikki[haePvm()] || "").toLowerCase();
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'fi-FI';

        recognition.onstart = () => {
            isRecording = true;
            lockRestart = false;
            recordBtn.classList.add('recording');
            recordZone.classList.add('recording');
            btnText.innerText = "Lopeta";
            micIcon.innerText = "🛑";
            statusText.innerText = "Kuuntelen... Puhu vapaasti.";
            livePreview.style.display = "block";
        };

        recognition.onerror = (e) => {
            if (e.error === 'not-allowed') {
                statusText.innerText = "Mikrofoni estetty. Anna lupa.";
                lockRestart = true;
            }
        };

        recognition.onend = () => {
            if (isRecording && !lockRestart) {
                clearTimeout(restartTimer);
                restartTimer = setTimeout(() => {
                    if (isRecording && !lockRestart) {
                        try { recognition.start(); } catch(e) {}
                    }
                }, 2500);
            } else if (!isRecording) {
                stopRecordingUI();
            }
        };

        recognition.onresult = (event) => {
            clearTimeout(restartTimer);
            let interim = '', final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
                else interim += event.results[i][0].transcript;
            }
            if (interim) livePreview.innerText = interim;

            if (final.trim().length > 0) {
                const siivottu = siivoaTeksti(final.trim());
                if (siivottu.length > 0) {
                    const uusiOsa = vainUusiOsa(siivottu, haeTallennettu());
                    if (uusiOsa && uusiOsa.trim().length > 1) {
                        tallennaMuistiin(uusiOsa.trim());
                        livePreview.innerText = "";
                        väläytäRuutu();
                    }
                }
            }
        };

        window.addEventListener('load', () => {
            pyydäWakeLock();
            statusText.innerText = "Käynnistetään automaattisesti...";
            setTimeout(() => {
                try { isRecording = true; recognition.start(); } catch(e) {}
            }, 2500);
        });

    } else {
        statusText.innerText = "Selaimesi ei tue puheentunnistusta.";
        recordBtn.disabled = true;
    }

    recordBtn.addEventListener('click', () => {
        if (!recognition) return;
        if (isRecording) {
            isRecording = false;
            clearTimeout(restartTimer);
            try { recognition.stop(); } catch(e) {}
            stopRecordingUI();
        } else {
            lockRestart = false;
            isRecording = true;
            pyydäWakeLock();
            try { recognition.start(); } catch(e) {}
        }
    });

    function stopRecordingUI() {
        recordBtn.classList.remove('recording');
        recordZone.classList.remove('recording');
        btnText.innerText = "Puhu";
        micIcon.innerText = "🎙️";
        statusText.innerText = "Valmis tallentamaan.";
        livePreview.style.display = "none";
        paivitaLista();
    }

    function tallennaMuistiin(uusiTeksti) {
        const pvm = haePvm();
        let kaikki = JSON.parse(localStorage.getItem('aanipaivakirja')) || {};
        if (kaikki[pvm]) {
            // Lisätään piste edellisen lauseen loppuun jos ei ole
            const edellinen = kaikki[pvm].trim();
            const viimeinenMerkki = edellinen.slice(-1);
            const erotin = ['.', '!', '?'].includes(viimeinenMerkki) ? ' ' : '. ';
            kaikki[pvm] = edellinen + erotin + uusiTeksti;
        } else {
            kaikki[pvm] = uusiTeksti;
        }
        localStorage.setItem('aanipaivakirja', JSON.stringify(kaikki));
        paivitaLista();
    }

    function tallennaMuokattu(pvm, uusiTeksti) {
        let kaikki = JSON.parse(localStorage.getItem('aanipaivakirja')) || {};
        kaikki[pvm] = uusiTeksti;
        localStorage.setItem('aanipaivakirja', JSON.stringify(kaikki));
        paivitaLista();
    }

    function poistaMerkintä(pvm) {
        if (confirm(`Poistetaanko päivän ${pvm} merkintä?`)) {
            let kaikki = JSON.parse(localStorage.getItem('aanipaivakirja')) || {};
            delete kaikki[pvm];
            localStorage.setItem('aanipaivakirja', JSON.stringify(kaikki));
            paivitaLista();
        }
    }

    function paivitaLista() {
        const container = document.getElementById('entriesContainer');
        container.innerHTML = '';
        const kaikki = JSON.parse(localStorage.getItem('aanipaivakirja')) || {};
        const päivät = Object.keys(kaikki).reverse();
        if (päivät.length === 0) {
            container.innerHTML = '<div class="no-entries">Ei tallennettuja päiviä.</div>';
            return;
        }
        päivät.forEach(pvm => {
            const teksti = kaikki[pvm];
            const card = document.createElement('div');
            card.className = 'entry-card';
            card.innerHTML = `
                <div class="entry-header">
                    <span class="entry-date">${pvm}</span>
                    <div class="actions">
                        <button class="btn-small" id="muokkaa-${pvm}">✏️ Muokkaa</button>
                        <button class="btn-small" id="jaa-${pvm}">Jaa</button>
                        <button class="btn-small delete" id="poista-${pvm}">Poista</button>
                    </div>
                </div>
                <div class="entry-content" id="content-${pvm}">${teksti}</div>
                <textarea class="entry-editor" id="editor-${pvm}">${teksti}</textarea>
                <button class="btn-small save" id="tallenna-${pvm}" style="display:none">💾 Tallenna</button>
            `;
            container.appendChild(card);

            const muokkaaBtn = document.getElementById(`muokkaa-${pvm}`);
            const tallennaBtn = document.getElementById(`tallenna-${pvm}`);
            const editor = document.getElementById(`editor-${pvm}`);
            const content = document.getElementById(`content-${pvm}`);

            muokkaaBtn.addEventListener('click', () => {
                const muokkausTila = editor.style.display === 'block';
                if (muokkausTila) {
                    // Sulje muokkaus
                    editor.style.display = 'none';
                    tallennaBtn.style.display = 'none';
                    muokkaaBtn.innerText = '✏️ Muokkaa';
                } else {
                    // Avaa muokkaus
                    editor.style.display = 'block';
                    tallennaBtn.style.display = 'block';
                    muokkaaBtn.innerText = '✕ Peruuta';
                    editor.focus();
                }
            });

            tallennaBtn.addEventListener('click', () => {
                const uusiTeksti = editor.value.trim();
                if (uusiTeksti.length > 0) {
                    tallennaMuokattu(pvm, uusiTeksti);
                }
            });

            document.getElementById(`jaa-${pvm}`).addEventListener('click', () => {
                if (navigator.share) navigator.share({ title: `Päiväkirja ${pvm}`, text: teksti }).catch(e => {});
                else alert("Laite ei tue suoraan jakoa.");
            });
            document.getElementById(`poista-${pvm}`).addEventListener('click', () => poistaMerkintä(pvm));
        });
    }

    paivitaLista();
</script>
</body>
</html>
